# ============================================
# Mosquitto config — DEVELOPMENT ONLY
# ============================================
# This config is intentionally permissive (no auth) so you can test
# publish/subscribe quickly while building the backend MQTT bridge.
# DO NOT use this config in production — see Task 3.7 in TASKS.md
# for the production auth/ACL setup that must be done before going live.

listener 1883
allow_anonymous true

# Log to console (easier to see what's happening while developing)
log_dest stdout
log_type all