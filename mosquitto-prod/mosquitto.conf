# ============================================
# Mosquitto config — PRODUCTION (with go-auth HTTP backend)
# ============================================
# Uses mosquitto-go-auth plugin to delegate authentication and ACL
# checking to the backend Node.js HTTP endpoints.
#
# Required env vars (set in docker-compose or .env):
#   BACKEND_URL — e.g. http://backend:4000 (Docker service name)
# ============================================

listener 1883
allow_anonymous false

# ── go-auth plugin ────────────────────────────────────────────────────────────
plugin /mosquitto/go-auth.so

auth_opt_backends http

# HTTP backend — calls the backend Node.js API
auth_opt_http_host            backend
auth_opt_http_port            4000
auth_opt_http_getuser_uri     /api/v1/mqtt/auth
auth_opt_http_aclcheck_uri    /api/v1/mqtt/acl
auth_opt_http_method          POST
auth_opt_http_content_type    application/x-www-form-urlencoded

# Cache successful auth results for 60s to reduce DB load
# (device credentials don't change mid-flight)
auth_opt_cache                true
auth_opt_cache_host           redis
auth_opt_cache_port           6379
auth_opt_cache_db             0
auth_opt_auth_cache_seconds   60
auth_opt_acl_cache_seconds    60

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
